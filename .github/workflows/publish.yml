name: Publish
on:
  push:
    branches:
      - main
      - base-v53
    paths:
      - RELEASE_NOTES.md
      - .github/workflows/publish.yml
jobs:
  pack:
    name: Package
    runs-on: windows-latest
    permissions:
      id-token: write # enable GitHub OIDC token issuance for this job
      contents: write
      packages: write 
    steps:  
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet paket restore

      - name: Build
        shell: cmd
        run: dotnet build -c Release src\Aardvark.Data.Durable.sln

      - name: Test
        run: dotnet test src\Aardvark.Data.Durable.sln -c Release --no-build --nologo --logger:"console;verbosity=normal"

      - name: Pack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet aardpack src\Aardvark.Data.Durable.sln --notag --skip-build

      - name: Upload Packages
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: bin\pack

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: NuGet
        shell: cmd
        run: dotnet nuget push "bin\pack\*.nupkg" -k ${{steps.login.outputs.NUGET_API_KEY}} -s "https://api.nuget.org/v3/index.json" --skip-duplicate
